name: Build and Upload v0.1.4 Assets

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Windows ZIP
        run: |
          mkdir -p dist/RKh-CFS-v0.1.4
          cp RKh-CFS-v0.1.4.py dist/RKh-CFS-v0.1.4/
          cp run_windows.bat dist/RKh-CFS-v0.1.4/
          cp requirements.txt dist/RKh-CFS-v0.1.4/
          cp README.md dist/RKh-CFS-v0.1.4/
          cp README_FA.md dist/RKh-CFS-v0.1.4/
          cp -r ip-ranges dist/RKh-CFS-v0.1.4/
          mkdir -p dist/RKh-CFS-v0.1.4/results
          cd dist
          zip -r RKh-CFS-win-v0.1.4.zip RKh-CFS-v0.1.4

      - name: Upload ZIP to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v0.1.4 \
            dist/RKh-CFS-win-v0.1.4.zip \
            --clobber
