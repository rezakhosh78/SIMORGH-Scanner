name: Upload Existing Release Assets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload existing ZIP files to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v0.1.4 \
            release-assets/RKh-CFS-win-v0.1.4.zip \
            release-assets/RKh-CFS-Termux-v0.1.4.zip \
            --clobber
