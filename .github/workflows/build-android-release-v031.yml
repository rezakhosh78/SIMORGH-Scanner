name: Build & Release Signed Android APK v0.3.1 (SDK Fix v2)

on:
  workflow_dispatch:
  push:
    tags:
      - "v0.3.1"

permissions:
  contents: write

concurrency:
  group: simorgh-android-release-v0.3.1
  cancel-in-progress: false

env:
  VERSION: "0.3.1"
  TAG_NAME: "v0.3.1"
  APK_NAME: "SIMORGH-Scanner-v0.3.1-arm64-v8.apk"
  ANDROID_PROJECT_DIR: "Android"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-sign-release:
    name: Build, sign and publish arm64-v8 APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            Android/*.gradle
            Android/gradle.properties
            Android/gradle/wrapper/gradle-wrapper.properties
            Android/app/*.gradle

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true
          cache-dependency-path: Android/go-backend/go.mod

      - name: Validate required signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          [ -n "$KEYSTORE_BASE64" ] || { echo "вЭМ Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "$KEYSTORE_PASSWORD" ] || { echo "вЭМ Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [ -n "$KEY_ALIAS" ] || { echo "вЭМ Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "$KEY_PASSWORD" ] || { echo "вЭМ Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }

          echo "вЬЕ All Android signing secrets are available."

      - name: Set up Android SDK and required packages
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: >-
            platform-tools
            platforms;android-35
            build-tools;35.0.0

      - name: Validate Android project
        run: |
          set -euo pipefail

          test -f Android/gradlew
          test -f Android/settings.gradle
          test -f Android/build.gradle
          test -f Android/app/build.gradle
          test -f Android/go-backend/go.mod
          test -f Android/go-backend/main.go
          test -f Android/app/src/main/jniLibs/arm64-v8a/libxray.so

          grep -q 'versionName "0.3.1"' Android/app/build.gradle
          grep -q 'abiFilters "arm64-v8a"' Android/app/build.gradle

          echo "вЬЕ Android project, versionName and arm64 ABI configuration are valid."


      - name: Apply v0.3.1 local server settings
        run: |
          set -euo pipefail

          sed -i 's/const port = "8080"/const port = "21301"/' \
            Android/go-backend/main.go

          sed -i 's#http://127.0.0.1:8080#http://127.0.0.1:21301#g' \
            Android/app/src/main/java/com/rkhcfs/go/MainActivity.java

          grep -q 'const port = "21301"' Android/go-backend/main.go
          grep -q 'http://127.0.0.1:21301' \
            Android/app/src/main/java/com/rkhcfs/go/MainActivity.java

          echo "вЬЕ Android backend and WebView are configured for 127.0.0.1:21301."

      - name: Build native Go backend for Android arm64
        working-directory: Android/go-backend
        run: |
          set -euo pipefail

          OUTPUT="../app/src/main/jniLibs/arm64-v8a/librkhcfs_go.so"
          mkdir -p "$(dirname "$OUTPUT")"
          rm -f "$OUTPUT"

          GOOS=android \
          GOARCH=arm64 \
          CGO_ENABLED=0 \
          go build \
            -buildmode=pie \
            -trimpath \
            -ldflags="-s -w" \
            -o "$OUTPUT" \
            .

          test -s "$OUTPUT"

          SIZE="$(stat -c%s "$OUTPUT")"
          if [ "$SIZE" -lt 1048576 ]; then
            echo "вЭМ Native Go backend is unexpectedly small: $SIZE bytes"
            exit 1
          fi

          file "$OUTPUT"
          echo "вЬЕ Native Go backend created: $OUTPUT ($SIZE bytes)"

      - name: Build unsigned release APK
        working-directory: Android
        run: |
          set -euo pipefail

          chmod +x gradlew
          ./gradlew \
            --no-daemon \
            --stacktrace \
            --warning-mode all \
            clean \
            :app:assembleRelease

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          KEYSTORE_PATH="$RUNNER_TEMP/rkh-cfs-release.p12"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"
          test -s "$KEYSTORE_PATH"

          keytool \
            -list \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -storetype PKCS12 \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            | grep -E 'Alias name:|SHA1:|SHA256:|Valid from:' || true

          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "вЬЕ Keystore decoded and alias validated."

      - name: Align and sign APK
        env:
          ANDROID_KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail

          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/35.0.0"
          ZIPALIGN="$BUILD_TOOLS_DIR/zipalign"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          test -x "$ZIPALIGN"
          test -x "$APKSIGNER"

          UNSIGNED_APK="$(find Android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*-unsigned.apk' -print -quit)"

          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK="$(find Android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)"
          fi

          [ -n "$UNSIGNED_APK" ] || { echo "вЭМ Release APK was not generated."; exit 1; }
          test -f "$UNSIGNED_APK"

          mkdir -p dist
          ALIGNED_APK="$RUNNER_TEMP/SIMORGH-Scanner-v${VERSION}-aligned.apk"
          FINAL_APK="dist/$APK_NAME"

          "$ZIPALIGN" \
            -P 16 \
            -f \
            -v \
            4 \
            "$UNSIGNED_APK" \
            "$ALIGNED_APK"

          "$APKSIGNER" sign \
            --ks "$KEYSTORE_PATH" \
            --ks-type PKCS12 \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KS_PASS \
            --key-pass env:ANDROID_KEY_PASS \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$FINAL_APK" \
            "$ALIGNED_APK"

          "$ZIPALIGN" -c -P 16 -v 4 "$FINAL_APK"

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            "$FINAL_APK"

          test -s "$FINAL_APK"
          echo "вЬЕ Signed APK created: $FINAL_APK"

      - name: Verify arm64-v8 APK contents
        run: |
          set -euo pipefail

          APK="dist/$APK_NAME"

          unzip -l "$APK" | grep -q 'lib/arm64-v8a/librkhcfs_go.so'
          unzip -l "$APK" | grep -q 'lib/arm64-v8a/libxray.so'

          if unzip -l "$APK" | grep -Eq 'lib/(armeabi-v7a|x86|x86_64)/'; then
            echo "вЭМ Unexpected non-arm64 ABI found in APK."
            exit 1
          fi

          echo "вЬЕ APK contains only the intended arm64-v8a native libraries."
          ls -lh "$APK"
          sha256sum "$APK"

      - name: Write bilingual release changelog
        run: |
          cat > release-notes.md <<'EOF'
          # рЯ¶Е SIMORGH Scanner v0.3.1 Changelog

          ## рЯЗЃрЯЗЈ ўБЎІЎ±Ў≥џМ

          ### вЬ® ўВЎІЎ®ўДџМЎ™вАМўЗЎІџМ ЎђЎѓџМЎѓ

          - ЎІЎґЎІўБўЗвАМЎіЎѓўЖ Ў®ЎЃЎівАМўЗЎІџМ Ў®ЎІЎ≤ ўИ Ў®Ў≥Ў™ўЗвАМЎіўИўЖЎѓўЗ Ў®Ў±ЎІџМ ўЗЎ± ISP ЎѓЎ± **ISP Files**
          - ўЕЎЃўБџМвАМЎ®ўИЎѓўЖ Ў±ўЖЎђвАМўЗЎІџМ IP ўЗЎ± ISP Ў®ўЗвАМЎµўИЎ±Ў™ ўЊџМЎівАМўБЎ±Ўґ ўИ ўЖўЕЎІџМЎі ЎҐўЖвАМўЗЎІ Ў®ЎІ Џ©ўДџМЏ© Ў±ўИџМ ўЖЎІўЕ ISP џМЎІ ЎҐџМЏ©ўЖ Ў®ЎІЎ≤ЎіЎѓўЖ
          - ЎІўЕЏ©ЎІўЖ ЎІўЖЎ™ЎЃЎІЎ® ЎђЎѓЎІЏѓЎІўЖўЗ ўЗЎ± Ў±ўЖЎђ IP
          - Ў≠ўБЎЄ Ў™џМЏ© ЎІЎµўДџМ ўЗЎ± ISP Ў®Ў±ЎІџМ ЎІўЖЎ™ЎЃЎІЎ® џМЎІ ўДЎЇўИ ЎІўЖЎ™ЎЃЎІЎ® ўЗўЕўЗ Ў±ўЖЎђвАМўЗЎІџМ ўЗўЕЎІўЖ ISP
          - ўЖўЕЎІџМЎі Ў≠ЎІўДЎ™ ўЖџМўЕўЗвАМЎІўЖЎ™ЎЃЎІЎ®вАМЎіЎѓўЗ Ў®Ў±ЎІџМ ISPўЗЎІџМџМ Џ©ўЗ ўБўВЎЈ Ў®ЎЃЎіџМ ЎІЎ≤ Ў±ўЖЎђвАМўЗЎІџМЎіЎІўЖ ЎІўЖЎ™ЎЃЎІЎ® ЎіЎѓўЗ ЎІЎ≥Ў™
          - ўЖўЕЎІџМЎі Ў™ЎєЎѓЎІЎѓ ISPўЗЎІџМ ЎІўЖЎ™ЎЃЎІЎ®вАМЎіЎѓўЗ Ў≤џМЎ± Ў®ЎЃЎі **ISP Files**
          - ЎІЎґЎІўБўЗвАМЎіЎѓўЖ Ў≠Ў®ЎІЎ® ЎЂЎІЎ®Ў™ Џ©ўЖЎ™Ў±ўД ЎІЎ≥Џ©ўЖ Ў≤џМЎ± ўЗЎѓЎ± ЎѓЎ± Ў®Ў±ЏѓўЗвАМўЗЎІџМ **Scanner** ўИ **Results**
          - ЎІЎґЎІўБўЗвАМЎіЎѓўЖ Ў®ЎІЎ≤џМЎІЎ®џМ ЎЃўИЎѓЏ©ЎІЎ± ўИЎґЎєџМЎ™ ЎІЎ≥Џ©ўЖ Ў®ЎєЎѓ ЎІЎ≤ ўВЎЈЎє ўЕўИўВЎ™ Ў®Џ©вАМЎІўЖЎѓ џМЎІ Ў®ЎІЎ≤Ў≥ЎІЎ≤џМ WebView
          - ЎІЎґЎІўБўЗвАМЎіЎѓўЖ Ў®Ў±Ў±Ў≥џМ Ў≥ўДЎІўЕЎ™ Ў®Џ©вАМЎІўЖЎѓ ўИ ЎІЎ™ЎµЎІўД ўЕЎђЎѓЎѓ ЎЃўИЎѓЏ©ЎІЎ±

          ### рЯФД Ў™ЎЇџМџМЎ±ЎІЎ™

          - ЎІўЖЎ™ўВЎІўД ЎѓЏ©ўЕўЗвАМўЗЎІџМ `Start Scan`ЎМ `Stop`ЎМ `Cancel` ўИ `Continue` Ў®ўЗ Ў≠Ў®ЎІЎ® ЎЂЎІЎ®Ў™ Џ©ўЖЎ™Ў±ўД ЎІЎ≥Џ©ўЖ
          - ўЖўЕЎІџМЎі Ў≠Ў®ЎІЎ® Џ©ўЖЎ™Ў±ўД ЎІЎ≥Џ©ўЖ ўБўВЎЈ ЎѓЎ± Ў®Ў±ЏѓўЗвАМўЗЎІџМ **Scanner** ўИ **Results**
          - Ў®ЎІўВџМвАМўЕЎІўЖЎѓўЖ ЎѓЏ©ўЕўЗ `Clear` ЎѓЎ± ўЕЎ≠ўД ўВЎ®ўДџМ
          - ЎѓЏ©ўЕўЗ `Clear` ЎІЏ©ўЖўИўЖ Ў™ЎІЎ±ЏѓЎ™ ЎѓЎ≥Ў™џМ ўИ ЎІўЖЎ™ЎЃЎІЎ®вАМўЗЎІџМ ISP/IP Range Ў±ЎІ ўЊЎІЏ© ўЕџМвАМЏ©ўЖЎѓ
          - ўЕўВЎѓЎІЎ± `VLESS Config` Ў®ЎІ ЎѓЏ©ўЕўЗ `Clear` ўЊЎІЏ© ўЖўЕџМвАМЎіўИЎѓ
          - Ў™ЎЇџМџМЎ± ўБўИўЖЎ™ ўЖЎІўЕ ISPўЗЎІ ўИ ўЕЎ™ўЖ ўБЎІџМўДвАМўЗЎІџМ ISP Ў®ўЗ ўБўИўЖЎ™џМ Ў≥ЎІЎѓўЗвАМЎ™Ў± ўИ ЎЃўИЎІўЖЎІЎ™Ў±
          - Ў™ЎЇџМџМЎ± Ў±ЎІўЗўЖўЕЎІџМ ўБџМўДЎѓ `Workers` Ў®ўЗ `Maximum 100`
          - ЎІЎ±Ў≥ЎІўД ўБўВЎЈ Ў±ўЖЎђвАМўЗЎІџМ IP ЎІўЖЎ™ЎЃЎІЎ®вАМЎіЎѓўЗ Ў®ўЗ ўЕўИЎ™ўИЎ± ЎІЎ≥Џ©ўЖ
          - Ў®ўЗЎ®ўИЎѓ ЏЖЎ±ЎЃўЗ ЎєўЕЎ± Ў®Џ©вАМЎІўЖЎѓ ЎІўЖЎѓЎ±ўИџМЎѓ ўИ ўЕЎ≥Ў™ўВўДвАМЎіЎѓўЖ ЎҐўЖ ЎІЎ≤ Ў®ЎІЎ≤Ў≥ЎІЎ≤џМ Activity
          - ЎІЎµўДЎІЎ≠ Ў®Ў≥Ў™ўЗвАМЎ®ўЖЎѓџМ Џ©Ў™ЎІЎ®ЎЃЎІўЖўЗ ЎҐўЕЎІЎѓўЗ Go Ў®Ў±ЎІџМ ЎђўДўИЏѓџМЎ±џМ ЎІЎ≤ ўИЎІЎ®Ў≥Ў™ЏѓџМ ЎЇџМЎ±ЎґЎ±ўИЎ±џМ Ў®ўЗ NDK ўЗўЖЏѓЎІўЕ Ў≥ЎІЎЃЎ™ APK

          ### рЯЫ†пЄП Ў±ўБЎє ЎІЎіЏ©ЎІўДЎІЎ™

          - Ў±ўБЎє ЎЃЎЈЎІџМ ўЕўВЎЈЎєџМ `Failed to fetch` ЎѓЎ± ЎіЎ±ўИЎє ЎІЎ≥Џ©ўЖ џМЎІ ЎІЎ≥Џ©ўЖ ўЕЎђЎѓЎѓ
          - Ў±ўБЎє ўЖџМЎІЎ≤ ЏѓЎІўЗвАМЎ®ўЗвАМЏѓЎІўЗ Ў®ўЗ Force Stop Џ©ЎІўЕўД Ў®Ў±ўЖЎІўЕўЗ Ў®Ў±ЎІџМ ЎіЎ±ўИЎє ЎѓўИЎ®ЎІЎ±ўЗ ЎІЎ≥Џ©ўЖ
          - Ў±ўБЎє ўЖўЕЎІџМЎі ЎІЎіЎ™Ў®ЎІўЗ `Completed` ўИ Ў™ўИўВўБ ЎІЎ≥Џ©ўЖ ўЗўЖЏѓЎІўЕ ЎђЎІЎ®ўЗвАМЎђЎІџМџМ Ў®џМўЖ Ў®Ў±ЏѓўЗвАМўЗЎІ
          - ЎђўДўИЏѓџМЎ±џМ ЎІЎ≤ Ў™Ў£ЎЂџМЎ± ЎђЎІЎ®ўЗвАМЎђЎІџМџМ Ў®џМўЖ `Scanner`ЎМ `Results`ЎМ `Files` ўИ `Logs` Ў®Ў± ЎІЎђЎ±ЎІџМ ЎІЎ≥Џ©ўЖ
          - ЎЂЎ®Ў™ ўИЎґЎєџМЎ™ `Completed` ўБўВЎЈ ўЊЎ≥ ЎІЎ≤ ЎѓЎ±џМЎІўБЎ™ Ў™Ў£џМџМЎѓ ўВЎЈЎєџМ ўЊЎІџМЎІўЖ ЎІЎ≥Џ©ўЖ ЎІЎ≤ Ў®Џ©вАМЎІўЖЎѓ
          - ЎђўДўИЏѓџМЎ±џМ ЎІЎ≤ Ў™ЎіЎЃџМЎµ ўЊЎІЎ≥ЎЃвАМўЗЎІџМ ўЖЎІўВЎµ џМЎІ ўЕўИўВЎ™ Ў®Џ©вАМЎІўЖЎѓ Ў®ўЗвАМЎєўЖўИЎІўЖ ўЊЎІџМЎІўЖ ЎІЎ≥Џ©ўЖ
          - ЎђўДўИЏѓџМЎ±џМ ЎІЎ≤ ЎІџМЎђЎІЎѓ ЎІЎ≥Џ©ўЖ Ў™Џ©Ў±ЎІЎ±џМ Ў®ЎІ ЎІЎ±Ў≥ЎІўД ЎѓўИЎ®ЎІЎ±ўЗ ЎѓЎ±ЎЃўИЎІЎ≥Ў™ ЎіЎ±ўИЎє
          - Ў®ЎІЎ≤џМЎІЎ®џМ ЎµЎ≠џМЎ≠ ЎѓЏ©ўЕўЗвАМўЗЎІЎМ Ў™ЎІџМўЕЎ±ўЗЎІ ўИ ўИЎґЎєџМЎ™ Ў±ЎІЎ®ЎЈ ўЊЎ≥ ЎІЎ≤ ЎЃЎЈЎІўЗЎІџМ ЎІЎ™ЎµЎІўД
          - ЎђўДўИЏѓџМЎ±џМ ЎІЎ≤ Ў®Ў≥Ў™ўЗвАМЎіЎѓўЖ Ў®Џ©вАМЎІўЖЎѓ ўЗўЖЏѓЎІўЕ Ў®ЎІЎ≤Ў≥ЎІЎ≤џМ Activity џМЎІ WebView
          - ЎђўДўИЏѓџМЎ±џМ ЎІЎ≤ Ў™ўИўВўБ Џ©ЎІўЕўД ўЕўИЎ™ўИЎ± ЎІЎ≥Џ©ўЖ ЎѓЎ± ЎІЎЂЎ± ЎЃЎЈЎІџМ џМЏ© Worker
          - Џ©ЎІўЗЎі ЎѓЎ±ЎЃўИЎІЎ≥Ў™вАМўЗЎІџМ ЎЇџМЎ±ЎґЎ±ўИЎ±џМ Ў®ЎЃЎі Logs ўЗўЖЏѓЎІўЕ ЎІЎђЎ±ЎІџМ ЎІЎ≥Џ©ўЖ

          ---

          ## рЯЗђрЯЗІ English

          ### вЬ® Added

          - Added expandable ISP sections in **ISP Files**
          - ISP IP ranges are hidden by default and can be shown by clicking the ISP name or expand icon
          - Added individual selection for each IP range
          - Kept a main checkbox for selecting or deselecting every range of an ISP
          - Added a partial-selection state when only some ranges of an ISP are selected
          - Added the selected ISP count below the **ISP Files** section
          - Added a persistent scan-control bubble below the header in the **Scanner** and **Results** tabs
          - Added automatic scan-state recovery after temporary backend or WebView interruptions
          - Added backend health checking and automatic reconnection

          ### рЯФД Changed

          - Moved `Start Scan`, `Stop`, `Cancel`, and `Continue` into the fixed scan-control bubble
          - The scan-control bubble is shown only in the **Scanner** and **Results** tabs
          - Kept the `Clear` button in its original location
          - The `Clear` button now clears the Manual Target and selected ISP/IP ranges
          - The `Clear` button no longer clears the `VLESS Config`
          - Changed ISP names and ISP file text to a simpler, more readable font
          - Changed the Workers field hint to `Maximum 100`
          - Only selected ISP IP ranges are sent to the scan engine
          - Improved the Android backend lifecycle so it is independent of Activity recreation
          - Improved packaging of the prebuilt Go library to avoid an unnecessary NDK dependency during APK builds

          ### рЯЫ†пЄП Fixed

          - Fixed intermittent `Failed to fetch` errors when starting or restarting a scan
          - Fixed cases where a complete Force Stop was required before scanning again
          - Fixed scans incorrectly showing `Completed` and stopping while switching tabs
          - Switching between `Scanner`, `Results`, `Files`, and `Logs` no longer affects scan execution
          - A scan is marked `Completed` only after confirmed completion from the backend
          - Temporary or incomplete backend responses are no longer treated as scan completion
          - Prevented duplicate scans when the same start request is submitted again
          - Restored buttons, timers, and UI state correctly after connection errors
          - Prevented the backend from shutting down during Activity or WebView recreation
          - Prevented a single Worker error from stopping the whole scan engine
          - Reduced unnecessary Logs polling during active scans
          EOF

      - name: Upload signed APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIMORGH-Scanner-v0.3.1-arm64-v8
          path: dist/SIMORGH-Scanner-v0.3.1-arm64-v8.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          APK="dist/$APK_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "вДєпЄП Release $TAG_NAME already exists; updating notes and APK."
            gh release edit "$TAG_NAME" \
              --title "SIMORGH Scanner v${VERSION}" \
              --notes-file release-notes.md

            gh release upload "$TAG_NAME" \
              "$APK" \
              --clobber
          else
            echo "вДєпЄП Creating release $TAG_NAME."
            gh release create "$TAG_NAME" \
              "$APK" \
              --target "$GITHUB_SHA" \
              --title "SIMORGH Scanner v${VERSION}" \
              --notes-file release-notes.md
          fi

          echo "вЬЕ Release published with asset: $APK_NAME"
